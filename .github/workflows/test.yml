name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: pytest (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short -q