# Production-compose: uses pre-built image from DockerHub
#
#   docker compose up -d
#
# For local development with hot-reload, use docker-compose.dev.yml instead:
#
#   docker compose -f docker-compose.dev.yml up --build
#
services:
  rhizome:
    image: isaaclb98/rhizome:latest
    environment:
      OPENAI_API_KEY: "${OPENAI_API_KEY:?OPENAI_API_KEY is required}"
      QDRANT_API_KEY: "${QDRANT_API_KEY:-}"
      QDRANT_URL: "${QDRANT_URL:-http://qdrant:6333}"
    env_file:
      - path: .env
        required: false
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    entrypoint: ["rhizome"]

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6333/readyz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
