vectorstore:
  url: "https://qdrant.aizaku.ca"
  api_key: "${QDRANT_API_KEY}"
  collection: "modernity-v1"
  vector_size: 1536  # OpenAI text-embedding-3-small = 1536 dimensions

traversal:
  depth: 8
  epsilon: 0.1
  top_k: 5

corpus:
  source: "wikipedia"
  domains:
    - "Modernism"
    - "Postmodernism"
  max_articles: 500
  depth: 1

openai:
  api_key: "${OPENAI_API_KEY}"
  model: "text-embedding-3-small"
